<!doctype html>
<html>
  <head>
    <title>Pokemon Catalog | Home</title>
    <meta name="description" content="A Catalog of All Pokemon" />
    <link rel="stylesheet" href="style.css" />
    
    <script src="pokemon_stats.js"></script>
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Pokemon Pokedex</h1>
    </header>

    <div id="card-container"></div>

    <template id="card-template">
      <div class="card">
        <img class="card-img" src="" alt="Pokemon Image" />
        <div class="card-content">
          <h2 class="card-title">Pokemon Name</h2>
          <p class="card-type">Type</p>
          <p class="card-id"></p>
          <p class="card-h_weight">Height / Weight</p>
          <p class="card-stats">Stats</p>
          <p class="card-ability">Ability</p>
        </div>
      </div>
    </template>

    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="poke_dex_1.load_next_batch()">Random Card!</button>
    </div>
  </body>
</html>
