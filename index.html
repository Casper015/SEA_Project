<!doctype html>
<html>
  <head>
    <title>Pokemon Catalog | Home</title>
    <meta name="description" content="A Catalog of All Pokemon" />
    <link rel="stylesheet" href="style.css" />
    
    <script src="./data/pokemon_stats_1_9.js"></script>
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Pokedex</h1>
      <div class="display-controls">
        <label for="display-count-input">Cards per page: </label>
        <input type="number" id="display-count-input" value="3" min="1" max="8" style="width: 50px;">
      </div>
    </header>

    <div id="card-container"></div>

    <template id="card-template">
      <div class="card">
        <img class="card-img" src="" alt="Pokemon Image" />
        <div class="card-content">
          <h2 class="card-title">Pokemon Name</h2>
          <p class="card-type">Type</p>
          <p class="card-id"></p>
          <p class="card-h_weight">Height / Weight</p>
          <p class="card-stats">Stats</p>
          <p class="card-ability">Ability</p>
        </div>
      </div>
    </template>

    <div class="footer">
      <button id="random-batch">Random Card!</button>
      <button id ="sort-order-btn" class = "sort-menu">Ascending</button>
        <select id="sort-dropdown" class="sort-menu">
          <option value="">random</option>
        </select>
      <button id="before-batch">Previous Card!</button>
      <button id="next-batch">Next Card!</button>
    </div>
  </body>
</html>
